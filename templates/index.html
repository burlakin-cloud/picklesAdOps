<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pickles Ads</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f8f6;--surface:#fff;--border:#e5e4df;--text:#1a1a18;--muted:#6b6b67;--accent:#378ADD;--danger:#E24B4A;--warn:#EF9F27;--ok:#1D9E75}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto}
.logo{padding:16px;font-weight:600;font-size:15px;border-bottom:1px solid var(--border)}
.sidebar-section{padding:12px 14px 4px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.client-item{padding:8px 14px;cursor:pointer;border-radius:6px;margin:1px 6px;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
.client-item:hover{background:var(--bg)}.client-item.active{background:#EAF3DE;color:#27500A;font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--ok)}
.main{flex:1;overflow-y:auto;padding:20px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.title{font-size:17px;font-weight:600;flex:1;min-width:120px}
.mode-group{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.mode-btn{padding:5px 12px;background:var(--surface);border:none;font-size:12px;color:var(--muted);cursor:pointer;border-right:1px solid var(--border)}
.mode-btn:last-child{border-right:none}
.mode-btn.active{background:var(--accent);color:#fff}
.date-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
input[type=date]{padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:13px;color:var(--text)}
.vs{font-size:11px;color:var(--muted)}
button.action{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap}
button.action:hover{background:var(--bg)}
button.action:disabled{opacity:.6;cursor:not-allowed}
button.tg{background:#229ED9;border-color:#229ED9;color:#fff}
button.tg:hover{background:#1a8fc7}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600}
.metric-delta{font-size:12px;margin-top:2px}
.delta-ok{color:var(--ok)}.delta-warn{color:var(--warn)}.delta-danger{color:var(--danger)}.delta-neutral{color:var(--muted)}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:var(--surface)}
.tab:hover{background:var(--bg)}.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.card-title{font-weight:600;font-size:14px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;color:var(--muted);font-weight:400;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500}
.badge-ok{background:#E1F5EE;color:#0F6E56}.badge-danger{background:#FCEBEB;color:#A32D2D}
.empty{color:var(--muted);text-align:center;padding:32px;font-size:13px}
.ch-block{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.ch-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.ch-header{font-weight:600;font-size:14px;margin-bottom:10px}
.ch-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px}
.ch-metric{background:var(--bg);border-radius:8px;padding:8px 10px}
.ch-metric-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.ch-metric-value{font-size:13px;font-weight:600}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:420px;max-width:95vw}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-section{margin-bottom:16px}
.modal-section label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.modal-dates{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px}
.modal-dates span{color:var(--muted);font-size:11px;display:block;margin-bottom:2px}
.modal-dates strong{font-size:13px}
.check-list{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:8px}
.check-item:hover{background:var(--bg)}
.check-item input{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);font-size:14px;cursor:pointer}
.btn-send{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.btn-send:hover{opacity:.9}
.btn-cancel{background:var(--surface)}
.btn-cancel:hover{background:var(--bg)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">📊 Pickles Ads</div>
  <div class="sidebar-section">Клиенты</div>
  <div id="client-list"></div>
</div>

<div class="main">
  <div class="toolbar">
    <div class="title" id="client-title">Выбери клиента</div>

    <div class="mode-group">
      <button class="mode-btn active" onclick="setMode('day')"   id="mode-day">День</button>
      <button class="mode-btn"        onclick="setMode('week')"  id="mode-week">Неделя</button>
      <button class="mode-btn"        onclick="setMode('month')" id="mode-month">Месяц</button>
      <button class="mode-btn"        onclick="setMode('range')" id="mode-range">Диапазон</button>
    </div>

    <div class="date-row" id="date-row">
      <input type="date" id="date-main"    onchange="onDateChange()">
      <span class="vs">vs</span>
      <input type="date" id="date-compare" onchange="onDateChange()">
    </div>

    <button class="action" onclick="fetchData()" id="fetch-btn">⟳ Обновить</button>
    <button class="action tg" onclick="openTgModal()" id="tg-btn">✈ В Telegram</button>
  </div>

  <div id="summary-metrics" class="metrics-grid"></div>
  <div class="tabs" id="channels-tabs"></div>
  <div id="main-content"><div class="empty">Выбери клиента слева</div></div>
</div>

<!-- Telegram modal -->
<div class="modal-overlay" id="tg-modal" onclick="if(event.target===this)closeTgModal()">
  <div class="modal">
    <h3>✈ Отправить отчёт в Telegram</h3>

    <div class="modal-section">
      <label>Период отчёта</label>
      <div class="modal-dates">
        <div><span>Основной</span><strong id="modal-date-from">—</strong> — <strong id="modal-date-to">—</strong></div>
        <div><span>Сравнение</span><strong id="modal-cmp-from">—</strong> — <strong id="modal-cmp-to">—</strong></div>
      </div>
    </div>

    <div class="modal-section">
      <label>Что включить в отчёт</label>
      <div class="check-list" id="modal-sections"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTgModal()">Отмена</button>
      <button class="btn-send"   onclick="doSendTelegram()" id="modal-send-btn">Отправить</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let clients = [], activeClient = null, activeChannel = 'all', adminToken = null;
let currentMode = 'day';
let dateFrom, dateTo, compareFrom, compareTo;

function isoDate(d){ return d.toISOString().split('T')[0]; }
function addDays(d, n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function startOfWeek(d){ const r=new Date(d); r.setDate(r.getDate()-((r.getDay()+6)%7)); return r; }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }

function initDates(){
  const today = new Date();
  const yest  = addDays(today, -1);
  const day2  = addDays(today, -2);
  dateFrom = compareFrom = isoDate(yest);
  dateTo   = isoDate(yest);
  compareTo = isoDate(day2);
  updateDateUI();
}

function setMode(mode){
  currentMode = mode;
  ['day','week','month','range'].forEach(m => {
    $(`mode-${m}`).classList.toggle('active', m===mode);
  });
  const today = new Date();
  const yest  = addDays(today,-1);

  const row = $('date-row');

  if(mode==='day'){
    row.innerHTML = `
      <input type="date" id="date-main"    onchange="onDateChange()">
      <span class="vs">vs</span>
      <input type="date" id="date-compare" onchange="onDateChange()">`;
    $('date-main').value    = isoDate(yest);
    $('date-compare').value = isoDate(addDays(today,-2));
    onDateChange();
  } else if(mode==='week'){
    const mon = startOfWeek(yest);
    const sun = addDays(mon, 6);
    row.innerHTML = `<span style="font-size:13px">Неделя:</span>
      <input type="date" id="date-main" onchange="onDateChange()">`;
    $('date-main').value = isoDate(mon);
    onDateChange();
  } else if(mode==='month'){
    row.innerHTML = `<span style="font-size:13px">Месяц:</span>
      <input type="month" id="date-main" onchange="onDateChange()">`;
    $('date-main').value = isoDate(today).slice(0,7);
    onDateChange();
  } else if(mode==='range'){
    row.innerHTML = `
      <input type="date" id="date-from" onchange="onDateChange()">
      <span class="vs">—</span>
      <input type="date" id="date-to"   onchange="onDateChange()">
      <span class="vs">vs</span>
      <input type="date" id="cmp-from"  onchange="onDateChange()">
      <span class="vs">—</span>
      <input type="date" id="cmp-to"    onchange="onDateChange()">`;
    $('date-from').value = isoDate(addDays(today,-7));
    $('date-to').value   = isoDate(yest);
    $('cmp-from').value  = isoDate(addDays(today,-14));
    $('cmp-to').value    = isoDate(addDays(today,-8));
    onDateChange();
  }
}

function onDateChange(){
  const today = new Date();
  const yest  = addDays(today,-1);

  if(currentMode==='day'){
    dateFrom    = $('date-main')?.value || isoDate(yest);
    dateTo      = dateFrom;
    compareFrom = $('date-compare')?.value || isoDate(addDays(today,-2));
    compareTo   = compareFrom;
  } else if(currentMode==='week'){
    const mon = new Date($('date-main').value+'T00:00:00');
    const sun = addDays(mon,6);
    const prevMon = addDays(mon,-7);
    const prevSun = addDays(mon,-1);
    dateFrom=isoDate(mon); dateTo=isoDate(sun);
    compareFrom=isoDate(prevMon); compareTo=isoDate(prevSun);
  } else if(currentMode==='month'){
    const val = $('date-main').value;
    const d = new Date(val+'-01');
    const prevD = new Date(d.getFullYear(), d.getMonth()-1, 1);
    dateFrom=isoDate(startOfMonth(d)); dateTo=isoDate(endOfMonth(d));
    compareFrom=isoDate(startOfMonth(prevD)); compareTo=isoDate(endOfMonth(prevD));
  } else if(currentMode==='range'){
    dateFrom    = $('date-from')?.value || '';
    dateTo      = $('date-to')?.value   || dateFrom;
    compareFrom = $('cmp-from')?.value  || '';
    compareTo   = $('cmp-to')?.value    || compareFrom;
  }
  load();
}

function updateDateUI(){ initDates(); }

async function loadClients(){
  clients = await fetch('/api/clients').then(r=>r.json());
  $('client-list').innerHTML = clients.map(c=>
    `<div class="client-item" onclick="selectClient('${c.id}')" id="ci-${c.id}">
      <div class="dot"></div>${c.name}
    </div>`).join('');
  if(clients.length) selectClient(clients[0].id);
}

function selectClient(id){
  activeClient = clients.find(c=>c.id===id);
  document.querySelectorAll('.client-item').forEach(el=>el.classList.remove('active'));
  const el=$(`ci-${id}`); if(el) el.classList.add('active');
  $('client-title').textContent = activeClient.name;
  activeChannel='all';
  load();
}

async function load(){
  if(!activeClient||!dateFrom) return;
  const url = `/api/clients/${activeClient.id}/summary?date_from=${dateFrom}&date_to=${dateTo}&compare_from=${compareFrom}&compare_to=${compareTo}`;
  const summary = await fetch(url).then(r=>r.json());
  renderMetrics(summary);
  renderTabs(summary);
  renderContent(summary);
}

function pct(a,b){ return b===0?null:(a-b)/b; }
function fmtD(d,m){
  if(d===null) return '<span class="delta-neutral">—</span>';
  const s=d>=0?'+':'', p=(d*100).toFixed(1);
  const bad=['cpc','cpa','spend'].includes(m)?d>0:d<0;
  const cls=Math.abs(d)>.25?(bad?'delta-danger':'delta-ok'):Math.abs(d)>.10?(bad?'delta-warn':'delta-ok'):'delta-neutral';
  return `<span class="${cls}">${s}${p}%</span>`;
}
function fmtM(v){ return '$'+v.toFixed(2); }
function fmtP(v){ return v.toFixed(2)+'%'; }

function renderMetrics(s){
  let t={spend:0,clicks:0,impressions:0,leads:0}, p={spend:0,clicks:0,impressions:0,leads:0};
  for(const ch of s.channels){ for(const k of Object.keys(t)){ t[k]+=ch.today[k]||0; p[k]+=ch.compare[k]||0; } }
  const cpa=t.leads>0?t.spend/t.leads:0, ctr=t.impressions>0?t.clicks/t.impressions*100:0;
  $('summary-metrics').innerHTML=[
    {l:'Расход', v:fmtM(t.spend), d:pct(t.spend,p.spend), m:'spend'},
    {l:'Клики',  v:t.clicks.toLocaleString(), d:pct(t.clicks,p.clicks), m:'clicks'},
    {l:'CTR',    v:fmtP(ctr), d:null, m:'ctr'},
    {l:'Лиды',   v:t.leads.toFixed(0), d:pct(t.leads,p.leads), m:'leads'},
    {l:'CPA',    v:fmtM(cpa), d:null, m:'cpa'},
  ].map(c=>`<div class="metric-card">
    <div class="metric-label">${c.l}</div>
    <div class="metric-value">${c.v}</div>
    <div class="metric-delta">${fmtD(c.d,c.m)}</div>
  </div>`).join('');
}

function renderTabs(s){
  const tabs=[{key:'all',label:'Все каналы'},...s.channels.map(c=>({key:c.channel,label:`${c.channel_icon} ${c.channel_name}`}))];
  $('channels-tabs').innerHTML=tabs.map(t=>`<div class="tab ${t.key===activeChannel?'active':''}" onclick="setChannel('${t.key}')">${t.label}</div>`).join('');
}

function setChannel(key){
  activeChannel=key;
  fetch(`/api/clients/${activeClient.id}/summary?date_from=${dateFrom}&date_to=${dateTo}&compare_from=${compareFrom}&compare_to=${compareTo}`)
    .then(r=>r.json()).then(s=>{ renderTabs(s); renderContent(s); });
}

async function renderContent(s){
  const el=$('main-content');
  if(!s.channels.length){ el.innerHTML='<div class="empty">Нет данных. Нажми «Обновить».</div>'; return; }
  if(activeChannel==='all'){
    el.innerHTML=`<div class="card"><div class="card-title">Сводка по каналам</div>`+
      s.channels.map(ch=>{
        const y=ch.today,p=ch.compare;
        return `<div class="ch-block">
          <div class="ch-header">${ch.channel_icon} ${ch.channel_name}</div>
          <div class="ch-metrics">
            ${[['Расход',fmtM(y.spend),pct(y.spend,p.spend),'spend'],
               ['CTR',fmtP(y.ctr),pct(y.ctr,p.ctr),'ctr'],
               ['CPC',fmtM(y.cpc),pct(y.cpc,p.cpc),'cpc'],
               ['CPM',fmtM(y.cpm),null,'cpm'],
               ['Лиды',y.leads.toFixed(0),pct(y.leads,p.leads),'leads'],
               ['CPA',fmtM(y.cpa),null,'cpa'],
            ].map(([l,v,d,m])=>`<div class="ch-metric">
              <div class="ch-metric-label">${l}</div>
              <div class="ch-metric-value">${v}</div>
              <div style="font-size:11px">${fmtD(d,m)}</div>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('')+`</div>`;
  } else {
    const ch=s.channels.find(c=>c.channel===activeChannel);
    if(!ch){ el.innerHTML='<div class="empty">Нет данных</div>'; return; }
    const camps=await fetch(`/api/clients/${activeClient.id}/campaigns?channel=${activeChannel}&date_from=${dateFrom}&date_to=${dateTo}&compare_from=${compareFrom}&compare_to=${compareTo}`).then(r=>r.json());
    const y=ch.today,p=ch.compare;
    let rows='<div class="empty">Нет данных по кампаниям</div>';
    if(camps.campaigns?.length){
      rows=`<table><thead><tr>
        <th>Кампания</th><th>Расход</th><th>CTR</th><th>CPC</th><th>CPM</th><th>Лиды</th><th>CPA</th><th>Статус</th>
      </tr></thead><tbody>`+camps.campaigns.map(({today:c,compare:cp})=>{
        const bad=['spend','ctr','cpc','leads'].some(m=>{const d=pct(c[m],cp[m]);return d!==null&&(['cpc','spend'].includes(m)?d>.25:d<-.20);});
        return `<tr>
          <td>${bad?'🔴':''} ${c.name}</td>
          <td>${fmtM(c.spend)} ${fmtD(pct(c.spend,cp.spend),'spend')}</td>
          <td>${fmtP(c.ctr)} ${fmtD(pct(c.ctr,cp.ctr),'ctr')}</td>
          <td>${fmtM(c.cpc)} ${fmtD(pct(c.cpc,cp.cpc),'cpc')}</td>
          <td>${fmtM(c.cpm)}</td>
          <td>${c.leads.toFixed(0)} ${fmtD(pct(c.leads,cp.leads),'leads')}</td>
          <td>${fmtM(c.cpa)}</td>
          <td><span class="badge ${bad?'badge-danger':'badge-ok'}">${bad?'Аномалия':'Норма'}</span></td>
        </tr>`;
      }).join('')+`</tbody></table>`;
    }
    el.innerHTML=`<div class="metrics-grid">`+
      [['Расход',fmtM(y.spend),pct(y.spend,p.spend),'spend'],['CTR',fmtP(y.ctr),pct(y.ctr,p.ctr),'ctr'],
       ['CPC',fmtM(y.cpc),pct(y.cpc,p.cpc),'cpc'],['CPM',fmtM(y.cpm),null,'cpm'],
       ['Лиды',y.leads.toFixed(0),pct(y.leads,p.leads),'leads'],['CPA',fmtM(y.cpa),null,'cpa'],
      ].map(([l,v,d,m])=>`<div class="metric-card">
        <div class="metric-label">${l}</div><div class="metric-value">${v}</div>
        <div class="metric-delta">${fmtD(d,m)}</div>
      </div>`).join('')+`</div>
      <div class="card"><div class="card-title">Кампании — ${ch.channel_icon} ${ch.channel_name}</div>${rows}</div>`;
  }
}

function getToken(){
  if(!adminToken) adminToken=prompt('Admin token:');
  return adminToken;
}

async function fetchData(){
  const btn=$('fetch-btn'), token=getToken();
  if(!token) return;
  btn.textContent='⏳ Загружаю...'; btn.disabled=true;
  try{
    const r=await fetch('/api/fetch',{
      method:'POST',
      headers:{'X-Admin-Token':token,'Content-Type':'application/json'},
      body:JSON.stringify({date_from:dateFrom,date_to:dateTo,compare_from:compareFrom,compare_to:compareTo})
    });
    if(r.ok){ btn.textContent='✓ Готово'; await load(); }
    else{ adminToken=null; btn.textContent='✗ Ошибка'; }
  }catch(e){ btn.textContent='✗ Ошибка'; }
  btn.disabled=false;
  setTimeout(()=>btn.textContent='⟳ Обновить',2000);
}

function openTgModal(){
  if(!activeClient) return;
  $('modal-date-from').textContent = dateFrom;
  $('modal-date-to').textContent   = dateTo===dateFrom ? '' : '— '+dateTo;
  $('modal-cmp-from').textContent  = compareFrom;
  $('modal-cmp-to').textContent    = compareTo===compareFrom ? '' : '— '+compareTo;

  const sections=[
    {key:'summary',     label:'📊 Сводка (все каналы)',          checked:true},
    ...activeClient.channels.map(ch=>({
      key:ch.key+'_campaigns',
      label:`${ch.icon} ${ch.name} (разбивка по кампаниям)`,
      checked:false
    }))
  ];
  $('modal-sections').innerHTML=sections.map(s=>`
    <label class="check-item">
      <input type="checkbox" value="${s.key}" ${s.checked?'checked':''}>
      ${s.label}
    </label>`).join('');
  $('tg-modal').classList.add('open');
}

function closeTgModal(){ $('tg-modal').classList.remove('open'); }

async function doSendTelegram(){
  const token=getToken(); if(!token) return;
  const btn=$('modal-send-btn');
  const sections=[...$('modal-sections').querySelectorAll('input:checked')].map(i=>i.value);
  if(!sections.length){ alert('Выбери хотя бы один раздел'); return; }

  btn.textContent='⏳ Отправляю...'; btn.disabled=true;
  try{
    const r=await fetch('/api/send_telegram',{
      method:'POST',
      headers:{'X-Admin-Token':token,'Content-Type':'application/json'},
      body:JSON.stringify({
        client_id:   activeClient.id,
        date_from:   dateFrom, date_to:   dateTo,
        compare_from:compareFrom, compare_to:compareTo,
        sections
      })
    });
    if(r.ok){ btn.textContent='✓ Отправлено'; setTimeout(closeTgModal,1500); }
    else{ adminToken=null; btn.textContent='✗ Ошибка'; }
  }catch(e){ btn.textContent='✗ Ошибка'; }
  btn.disabled=false;
  setTimeout(()=>btn.textContent='Отправить',2000);
}

initDates();
loadClients();
</script>
