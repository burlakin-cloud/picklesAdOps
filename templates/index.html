<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickles Ads</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f8f6;--surface:#fff;--border:#e5e4df;--text:#1a1a18;--muted:#6b6b67;--accent:#378ADD;--danger:#E24B4A;--warn:#EF9F27;--ok:#1D9E75;--sidebar:220px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:16px;font-weight:600;font-size:15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-section{padding:12px 14px 4px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.client-item{padding:8px 14px;cursor:pointer;border-radius:6px;margin:1px 6px;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
.client-item:hover{background:var(--bg)}
.client-item.active{background:#EAF3DE;color:#27500A;font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--muted)}
.dot.ok{background:var(--ok)}.dot.warn{background:var(--warn)}.dot.danger{background:var(--danger)}
.main{flex:1;overflow-y:auto;padding:20px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.title{font-size:17px;font-weight:600;flex:1}
input[type=date],select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:13px;color:var(--text)}
button{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:5px}
button:hover{background:var(--bg)}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.primary:hover{opacity:.9}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600;color:var(--text)}
.metric-delta{font-size:12px;margin-top:2px}
.delta-ok{color:var(--ok)}.delta-warn{color:var(--warn)}.delta-danger{color:var(--danger)}.delta-neutral{color:var(--muted)}
.channels-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:var(--surface)}
.tab:hover{background:var(--bg)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.card-title{font-weight:600;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;color:var(--muted);font-weight:400;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500}
.badge-ok{background:#E1F5EE;color:#0F6E56}
.badge-warn{background:#FAEEDA;color:#854F0B}
.badge-danger{background:#FCEBEB;color:#A32D2D}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.empty{color:var(--muted);text-align:center;padding:32px;font-size:13px}
.flag-danger{color:var(--danger);font-weight:600}
.flag-warn{color:var(--warn);font-weight:600}
.channel-block{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.channel-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.channel-header{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;margin-bottom:10px}
.channel-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:10px}
.channel-metric{background:var(--bg);border-radius:8px;padding:8px 10px}
.channel-metric-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.channel-metric-value{font-size:14px;font-weight:600}
@media(max-width:700px){.grid2{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">📊 Pickles Ads</div>
  <div class="sidebar-section">Клиенты</div>
  <div id="client-list"></div>
</div>

<div class="main">
  <div class="toolbar">
    <div class="title" id="client-title">Выбери клиента</div>
    <input type="date" id="date-main" onchange="load()">
    <span style="color:var(--muted);font-size:12px">vs</span>
    <input type="date" id="date-compare" onchange="load()">
    <button onclick="fetchData()" id="fetch-btn">⟳ Обновить данные</button>
    <button onclick="sendTelegram()" id="tg-btn" style="background:#229ED9;border-color:#229ED9;color:#fff">✈ Отправить в Telegram</button>
  </div>

  <div id="summary-metrics" class="metrics-grid"></div>

  <div class="channels-tabs" id="channels-tabs"></div>

  <div id="main-content"><div class="empty">Выбери клиента слева</div></div>
</div>

<script>
const $ = id => document.getElementById(id);
let clients = [], activeClient = null, activeChannel = 'all';

function isoDate(d) { return d.toISOString().split('T')[0]; }

// Инициализация дат
const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
const dayBefore  = new Date(); dayBefore.setDate(dayBefore.getDate()-2);
$('date-main').value    = isoDate(yesterday);
$('date-compare').value = isoDate(dayBefore);

// Загрузка списка клиентов
async function loadClients() {
  const res = await fetch('/api/clients');
  clients = await res.json();
  const list = $('client-list');
  list.innerHTML = clients.map(c => `
    <div class="client-item" onclick="selectClient('${c.id}')" id="ci-${c.id}">
      <div class="dot"></div>${c.name}
    </div>`).join('');
  if (clients.length > 0) selectClient(clients[0].id);
}

function selectClient(id) {
  activeClient = clients.find(c => c.id === id);
  document.querySelectorAll('.client-item').forEach(el => el.classList.remove('active'));
  const el = $(`ci-${id}`); if (el) el.classList.add('active');
  $('client-title').textContent = activeClient.name;
  activeChannel = 'all';
  load();
}

async function load() {
  if (!activeClient) return;
  const date    = $('date-main').value;
  const compare = $('date-compare').value;

  const [summary] = await Promise.all([
    fetch(`/api/clients/${activeClient.id}/summary?date=${date}&compare=${compare}`).then(r=>r.json())
  ]);

  renderSummaryMetrics(summary);
  renderChannelTabs(summary);
  renderContent(summary, date, compare);
}

function pctChange(a, b) { return b===0 ? null : (a-b)/b; }

function fmtDelta(delta, metric) {
  if (delta===null) return '<span class="delta-neutral">—</span>';
  const pct = (delta*100).toFixed(1);
  const sign = delta>=0?'+':'';
  const bad = ['cpc','cpa','spend'].includes(metric) ? delta>0 : delta<0;
  const cls = Math.abs(delta) > 0.25 ? (bad?'delta-danger':'delta-ok') :
              Math.abs(delta) > 0.10 ? (bad?'delta-warn':'delta-ok') : 'delta-neutral';
  return `<span class="${cls}">${sign}${pct}%</span>`;
}

function fmtMoney(v) { return '$'+v.toFixed(2); }
function fmtPct(v)   { return v.toFixed(2)+'%'; }

function renderSummaryMetrics(summary) {
  // Суммируем по всем каналам
  let totals = {spend:0,clicks:0,impressions:0,leads:0};
  let prev   = {spend:0,clicks:0,impressions:0,leads:0};
  for (const ch of summary.channels) {
    for (const k of Object.keys(totals)) { totals[k]+=ch.today[k]||0; prev[k]+=ch.compare[k]||0; }
  }
  const ctr = totals.impressions>0 ? totals.clicks/totals.impressions*100 : 0;
  const cpa = totals.leads>0 ? totals.spend/totals.leads : 0;

  const cards = [
    {label:'Расход',  val:fmtMoney(totals.spend),  delta:pctChange(totals.spend,prev.spend),   m:'spend'},
    {label:'Клики',   val:totals.clicks.toLocaleString(), delta:pctChange(totals.clicks,prev.clicks), m:'clicks'},
    {label:'CTR',     val:fmtPct(ctr),              delta:null, m:'ctr'},
    {label:'Лиды',    val:totals.leads.toFixed(0),  delta:pctChange(totals.leads,prev.leads),   m:'leads'},
    {label:'CPA',     val:fmtMoney(cpa),            delta:null, m:'cpa'},
  ];

  $('summary-metrics').innerHTML = cards.map(c=>`
    <div class="metric-card">
      <div class="metric-label">${c.label}</div>
      <div class="metric-value">${c.val}</div>
      <div class="metric-delta">${fmtDelta(c.delta, c.m)}</div>
    </div>`).join('');
}

function renderChannelTabs(summary) {
  const tabs = [
    {key:'all', label:'Все каналы'},
    ...summary.channels.map(ch=>({key:ch.channel, label:`${ch.channel_icon} ${ch.channel_name}`}))
  ];
  $('channels-tabs').innerHTML = tabs.map(t=>`
    <div class="tab ${t.key===activeChannel?'active':''}"
         onclick="setChannel('${t.key}')">${t.label}</div>`).join('');
}

function setChannel(key) {
  activeChannel = key;
  const date    = $('date-main').value;
  const compare = $('date-compare').value;
  fetch(`/api/clients/${activeClient.id}/summary?date=${date}&compare=${compare}`)
    .then(r=>r.json()).then(s=>{
      renderChannelTabs(s);
      renderContent(s, date, compare);
    });
}

async function renderContent(summary, date, compare) {
  const content = $('main-content');
  if (summary.channels.length===0) {
    content.innerHTML = '<div class="empty">Нет данных за выбранный день. Запусти обновление.</div>';
    return;
  }

  if (activeChannel==='all') {
    content.innerHTML = renderAllChannels(summary);
  } else {
    const ch = summary.channels.find(c=>c.channel===activeChannel);
    if (!ch) { content.innerHTML='<div class="empty">Нет данных по каналу</div>'; return; }
    const camps = await fetch(
      `/api/clients/${activeClient.id}/campaigns?channel=${activeChannel}&date=${date}&compare=${compare}`
    ).then(r=>r.json());
    content.innerHTML = renderChannelDetail(ch, camps);
  }
}

function renderAllChannels(summary) {
  if (!summary.channels.length) return '<div class="empty">Нет данных</div>';
  const blocks = summary.channels.map(ch => {
    const y=ch.today, p=ch.compare;
    const hasFlag = ['spend','ctr','cpc','leads'].some(m=>{
      const d=pctChange(y[m],p[m]);
      if(d===null) return false;
      const bad = ['cpc','cpa','spend'].includes(m)?d>0.25:d<-0.20;
      return bad;
    });
    return `
    <div class="channel-block">
      <div class="channel-header">
        ${hasFlag?'🔴':'🟢'} ${ch.channel_icon} ${ch.channel_name}
      </div>
      <div class="channel-metrics">
        ${metricMini('Расход', fmtMoney(y.spend), pctChange(y.spend,p.spend), 'spend')}
        ${metricMini('CTR',    fmtPct(y.ctr),      pctChange(y.ctr,p.ctr),    'ctr')}
        ${metricMini('CPC',    fmtMoney(y.cpc),    pctChange(y.cpc,p.cpc),    'cpc')}
        ${metricMini('CPM',    fmtMoney(y.cpm),    null,                      'cpm')}
        ${metricMini('Лиды',   y.leads.toFixed(0), pctChange(y.leads,p.leads),'leads')}
        ${metricMini('CPA',    fmtMoney(y.cpa),    null,                      'cpa')}
      </div>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-title">📋 Сводка по каналам</div>${blocks}</div>`;
}

function metricMini(label, val, delta, m) {
  return `<div class="channel-metric">
    <div class="channel-metric-label">${label}</div>
    <div class="channel-metric-value">${val}</div>
    <div style="font-size:11px">${fmtDelta(delta,m)}</div>
  </div>`;
}

function renderChannelDetail(ch, camps) {
  const y=ch.today, p=ch.compare;
  const metricsHtml = `
    <div class="metrics-grid">
      ${[
        ['Расход',  fmtMoney(y.spend),   pctChange(y.spend,p.spend),  'spend'],
        ['CTR',     fmtPct(y.ctr),       pctChange(y.ctr,p.ctr),      'ctr'],
        ['CPC',     fmtMoney(y.cpc),     pctChange(y.cpc,p.cpc),      'cpc'],
        ['CPM',     fmtMoney(y.cpm),     null,                        'cpm'],
        ['Лиды',    y.leads.toFixed(0),  pctChange(y.leads,p.leads),  'leads'],
        ['CPA',     fmtMoney(y.cpa),     null,                        'cpa'],
      ].map(([l,v,d,m])=>`
        <div class="metric-card">
          <div class="metric-label">${l}</div>
          <div class="metric-value">${v}</div>
          <div class="metric-delta">${fmtDelta(d,m)}</div>
        </div>`).join('')}
    </div>`;

  let campsHtml = '<div class="empty">Нет данных по кампаниям</div>';
  if (camps.campaigns && camps.campaigns.length) {
    const rows = camps.campaigns.map(({today:c, compare:cp})=>{
      const flags = ['spend','ctr','cpc','leads'].map(m=>{
        const d=pctChange(c[m],cp[m]);
        if(d===null) return '';
        const bad=['cpc','spend'].includes(m)?d>0.25:d<-0.20;
        return bad?'🔴':'';
      }).filter(Boolean);
      const badge = flags.length
        ? '<span class="badge badge-danger">Аномалия</span>'
        : '<span class="badge badge-ok">Норма</span>';
      return `<tr>
        <td>${flags.length?'🔴':''} ${c.name}</td>
        <td>${fmtMoney(c.spend)} ${fmtDelta(pctChange(c.spend,cp.spend),'spend')}</td>
        <td>${fmtPct(c.ctr)} ${fmtDelta(pctChange(c.ctr,cp.ctr),'ctr')}</td>
        <td>${fmtMoney(c.cpc)} ${fmtDelta(pctChange(c.cpc,cp.cpc),'cpc')}</td>
        <td>${fmtMoney(c.cpm)}</td>
        <td>${c.leads.toFixed(0)} ${fmtDelta(pctChange(c.leads,cp.leads),'leads')}</td>
        <td>${fmtMoney(c.cpa)}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('');
    campsHtml = `<table>
      <thead><tr>
        <th>Кампания</th><th>Расход</th><th>CTR</th>
        <th>CPC</th><th>CPM</th><th>Лиды</th><th>CPA</th><th>Статус</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  return metricsHtml + `<div class="card">
    <div class="card-title">📋 Кампании — ${ch.channel_icon} ${ch.channel_name}</div>
    ${campsHtml}
  </div>`;
}

let adminToken = null;
function getToken() {
  if (!adminToken) adminToken = prompt('Admin token:');
  return adminToken;
}

async function apiAction(endpoint, btnId, labels) {
  const btn = $(btnId);
  const token = getToken();
  if (!token) return;
  btn.textContent = labels.loading;
  btn.disabled = true;
  try {
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: {'X-Admin-Token': token}
    });
    if (r.ok) {
      btn.textContent = labels.ok;
      setTimeout(() => { btn.textContent = labels.default; btn.disabled = false; load(); }, 8000);
    } else {
      adminToken = null;
      btn.textContent = '✗ Ошибка'; btn.disabled = false;
    }
  } catch(e) { btn.textContent = '✗ Ошибка'; btn.disabled = false; }
}

function fetchData() {
  apiAction('/api/fetch', 'fetch-btn',
    {loading: '⏳ Загружаю...', ok: '✓ Данные обновлены', default: '⟳ Обновить данные'});
}

function sendTelegram() {
  apiAction('/api/send_telegram', 'tg-btn',
    {loading: '⏳ Отправляю...', ok: '✓ Отправлено', default: '✈ Отправить в Telegram'});
}

loadClients();
</script>
</body>
</html>
